name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      AUTH_SECRET: "ci-secret-not-real"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    # Flujo critico en navegador real contra la rama dev de Neon (secret E2E_DATABASE_URL)
    runs-on: ubuntu-latest
    needs: ci
    env:
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      AUTH_SECRET: "ci-e2e-secret-not-real"
      NEXTAUTH_URL: "http://localhost:3000"
      RATE_LIMIT_BACKEND: "memory"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
